<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="自動で走るキャラクターをジャンプで操作するゲーム">
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ランニングゲーム</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 50%,#2d3561 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}
        .game-container{width:100%;max-width:800px;text-align:center;position:relative;z-index:1;animation:fadeIn 1s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .back-link{display:inline-block;margin-bottom:20px;color:rgba(255,255,255,.8);text-decoration:none;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:transform .3s}
        .back-link:hover{color:#fff;background:rgba(255,255,255,.1);transform:translateY(-2px)}
        h1{font-size:2.5em;margin-bottom:20px;color:#fff;font-weight:300;animation:titleFloat 3s ease-in-out infinite}
        @keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        .game-info{display:flex;justify-content:space-around;margin-bottom:20px;color:#fff;font-size:1.2em;background:rgba(255,255,255,.05);padding:15px;border-radius:16px;border:1px solid rgba(255,255,255,.1)}
        .info-item{display:flex;flex-direction:column;gap:5px}
        .info-label{font-size:.7em;opacity:.9}
        .info-value{font-size:1.3em;font-weight:600;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        #gameCanvas{border:1px solid rgba(255,255,255,.1);border-radius:24px;background:linear-gradient(to bottom,#1e3a5f,#2d5a7f,#4a7ba7);display:block;width:100%;max-width:800px;height:400px;margin:0 auto}
        .controls{margin-top:20px;color:rgba(255,255,255,.8);font-size:1em}
        .btn{padding:16px 48px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:50px;font-weight:500;cursor:pointer;transition:transform .3s;box-shadow:0 8px 24px rgba(102,126,234,.4);touch-action:manipulation}
        .jump-btn{margin-top:15px;font-size:1.2em}
        .jump-btn:active{transform:scale(.96)}
        .restart-btn,.next-stage-btn{margin-top:20px;font-size:1.1em}
        .restart-btn:hover,.next-stage-btn:hover{transform:translateY(-2px)}
        .start-btn{font-size:1.3em}
        .start-btn:hover{transform:translateY(-2px)}
        .start-btn:active{transform:translateY(0)}
        .start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal.show{display:flex}
        .modal-content{background:rgba(30,30,30,.95);padding:40px;border-radius:24px;text-align:center;max-width:90%;width:400px;border:1px solid rgba(255,255,255,.1);animation:modalIn .4s ease-out}
        @keyframes modalIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        .modal-content h2{font-size:2em;margin-bottom:20px;color:#fff;font-weight:300}
        .modal-content p{font-size:1.2em;margin-bottom:10px;color:rgba(255,255,255,.7)}
        .stage-clear-content h2{font-size:2.5em}
        .stage-clear-content p{font-size:1.3em;margin-bottom:30px}
        .start-section{margin-bottom:20px;text-align:center}
        .last-update{margin-top:10px;font-size:.85em;color:rgba(255,255,255,.8)}
        @media(max-width:600px){h1{font-size:2em}.game-info{font-size:1em}#gameCanvas{height:300px}}
    </style>
</head>
<body>
    <div class="game-container">
        <a href="index.html" class="back-link">← 玄関に戻る</a>
        <h1>🏃 ランニングゲーム</h1>
        
        <div class="start-section">
            <button class="btn start-btn" id="startBtn">ゲーム開始</button>
            <div class="last-update" id="lastUpdate"></div>
            <div id="errorMessage" style="display: none; color: #ff6b6b; margin-top: 10px; padding: 10px; background: rgba(255, 107, 107, 0.1); border-radius: 8px; font-size: 0.9em;"></div>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">ステージ</div>
                <div class="info-value" id="stageDisplay">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">残り距離</div>
                <div class="info-value" id="distanceDisplay">0</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <p>スペースキーまたはボタンでジャンプ</p>
            <button class="btn jump-btn" id="jumpBtn">ジャンプ！</button>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>ゲームオーバー</h2>
            <p>障害物に当たってしまいました</p>
            <button class="btn restart-btn" onclick="restartStage()">もう一度挑戦</button>
        </div>
    </div>

    <div class="modal" id="stageClearModal">
        <div class="modal-content stage-clear-content">
            <h2>🎉 ステージクリア！</h2>
            <p id="stageClearMessage">ステージ1をクリアしました！</p>
            <button class="btn next-stage-btn" onclick="nextStage()">次のステージへ</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
        const useLightweightMode = isMobile || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4);
        if (useLightweightMode) {
            ctx.imageSmoothingEnabled = false;
        }
        
        function resizeCanvas() {
            const maxWidth = 800;
            const maxHeight = 400;
            const aspectRatio = maxWidth / maxHeight;
            
            let width = Math.min(window.innerWidth - 40, maxWidth);
            let height = width / aspectRatio;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * aspectRatio;
            }
            
            canvas.width = width;
            canvas.height = height;
        }
        
        function onResize() { resizeCanvas(); updatePlayerGroundPosition(); }
        resizeCanvas();
        window.addEventListener('resize', onResize);

        let lastFrameTime = 0;
        const targetFPS = useLightweightMode ? 30 : 60;
        const frameInterval = 1000 / targetFPS;

        let currentStage = 1;
        let gameRunning = false;
        let gamePaused = false;

        const player = {
            x: 100,
            y: 0,
            width: 180,
            height: 180,
            velocityY: 0,
            isJumping: false,
            groundY: 0,
            color: '#ff6b6b'
        };

        const playerSpriteSheet = new Image();
        let playerImageLoaded = false;
        const spriteFrameCount = 4;
        let spriteFrameWidth = 0;
        playerSpriteSheet.src = 'shiba.png';
        playerSpriteSheet.onload = function() {
            playerImageLoaded = true;
            spriteFrameWidth = playerSpriteSheet.width / spriteFrameCount;
            const imageAspectRatio = spriteFrameWidth / playerSpriteSheet.height;
            player.height = 180;
            player.width = player.height * imageAspectRatio;
            updatePlayerGroundPosition();
        };
        playerSpriteSheet.onerror = function() {
            playerImageLoaded = false;
            updatePlayerGroundPosition();
        };
        let animationFrameIndex = 0;
        let animationCounter = 0;
        const animationSpeed = 8;
        const groundHeight = 50;
        function updatePlayerGroundPosition() {
            if (typeof player === 'undefined' || !player) return;
            if (!canvas || canvas.height <= 0) return;
            player.groundY = canvas.height - groundHeight - player.height;
            if (!player.isJumping && player.velocityY === 0) player.y = player.groundY;
        }
        updatePlayerGroundPosition();
        

        let cameraX = 0;
        let targetCameraX = 0;
        const scrollSpeed = 1.8;
        let obstacles = [];
        let pits = [];
        let goalX = 0;
        const stages = [
            {
                obstacles: [
                    { x: 1000, width: 60, height: 80, type: 'box' },
                    { x: 1600, width: 60, height: 100, type: 'box' },
                    { x: 2400, width: 60, height: 60, type: 'triangle' }
                ],
                pits: [
                    { x: 1300, width: 100 },
                    { x: 1900, width: 80 }
                ],
                goal: 3000
            },
            {
                obstacles: [
                    { x: 800, width: 60, height: 90, type: 'box' },
                    { x: 1400, width: 60, height: 110, type: 'triangle' },
                    { x: 2000, width: 60, height: 70, type: 'box' },
                    { x: 2600, width: 60, height: 100, type: 'triangle' }
                ],
                pits: [
                    { x: 1100, width: 120 },
                    { x: 1700, width: 100 },
                    { x: 2300, width: 90 }
                ],
                goal: 3200
            },
            {
                obstacles: [
                    { x: 700, width: 60, height: 100, type: 'box' },
                    { x: 1200, width: 60, height: 120, type: 'triangle' },
                    { x: 1700, width: 60, height: 80, type: 'box' },
                    { x: 2200, width: 60, height: 110, type: 'triangle' },
                    { x: 2700, width: 60, height: 95, type: 'box' }
                ],
                pits: [
                    { x: 1000, width: 80 },
                    { x: 1500, width: 100 },
                    { x: 2000, width: 90 },
                    { x: 2500, width: 110 }
                ],
                goal: 3400
            }
        ];

        const gravity = 0.12;
        const jumpPower = -6;
        const groundFriction = 0.9;
        let audioContext = null;
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playJumpSound() {
            if (!audioContext) {
                initAudioContext();
            }
            
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 440;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioContext.currentTime + 0.01);
            gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        function playGameOverSound() {
            if (!audioContext) {
                initAudioContext();
            }
            
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 220;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.frequency.exponentialRampToValueAtTime(110, audioContext.currentTime + 0.3);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function loadStage(stageNumber) {
            try {
                if (!canvas || canvas.height === 0) return;
                const stage = stages[stageNumber - 1];
                if (!stage) return;
                
                obstacles = stage.obstacles.map(obs => ({
                    ...obs,
                    y: canvas.height - groundHeight - obs.height,
                    type: obs.type || 'box'
                }));
                pits = stage.pits.map(pit => ({
                    ...pit,
                    y: canvas.height - groundHeight,
                    depth: 200
                }));
                goalX = stage.goal;
                
                player.x = 100;
                player.velocityY = 0;
                player.isJumping = false;
                cameraX = 0;
                targetCameraX = 0;
                updatePlayerGroundPosition();
                player.y = player.groundY;
                
                updateDisplay();
            } catch (error) {
                throw error;
            }
        }

        function jump() {
            if (!player.isJumping && gameRunning && !gamePaused) {
                player.velocityY = jumpPower;
                player.isJumping = true;
                playJumpSound();
            }
        }
        function isOnObstacle(obs) {
            const obsScreenX = obs.x - cameraX;
            
            // プレイヤーの座標
            const playerLeft = player.x;
            const playerRight = player.x + player.width;
            const playerBottom = player.y + player.height;
            const playerTop = player.y;
            
            // プレイヤーが障害物のX範囲内にいるか（少しでも重なっていればOK）
            const isInXRange = playerRight > obsScreenX + 2 && 
                              playerLeft < obsScreenX + obs.width - 2;
            
            // プレイヤーの足が障害物の上端に触れているか（より寛容に）
            // 障害物の上端（obs.y）にプレイヤーの足が触れているか
            const isOnTop = playerBottom >= obs.y - 3 && playerBottom <= obs.y + 10;
            
            // プレイヤーが障害物の上にいる（落下中または着地時）
            const isFallingOrLanded = player.velocityY >= -1;
            
            return isInXRange && isOnTop && isFallingOrLanded;
        }

        function checkCollisions() {
            for (let obs of obstacles) {
                const obsScreenX = obs.x - cameraX;
                if (obs.type === 'box') {
                    if (isOnObstacle(obs)) continue;
                    const playerBottomY = player.y + player.height;
                    const playerTopY = player.y;
                    const playerLeft = player.x;
                    const playerRight = player.x + player.width;
                    const obsTopY = obs.y;
                    const obsBottomY = obs.y + obs.height;
                    const obsLeft = obsScreenX;
                    const obsRight = obsScreenX + obs.width;
                    const isDescendingFromObstacle = playerLeft > obsRight - 5 && playerBottomY >= obsTopY - 5 && playerBottomY <= obsTopY + 10;
                    const isOnLeftSide = playerRight > obsLeft && 
                                        playerRight < obsLeft + 20 &&
                                        playerTopY < obsBottomY && 
                                        playerBottomY > obsTopY &&
                                        !isDescendingFromObstacle;
                    const isOnRightSide = playerLeft < obsRight && 
                                         playerLeft > obsRight - 20 &&
                                         playerTopY < obsBottomY && 
                                         playerBottomY > obsTopY &&
                                         !isDescendingFromObstacle;
                    
                    if (isOnLeftSide || isOnRightSide) return true;
                    if (playerBottomY > obsTopY && 
                        playerTopY < obsTopY &&
                        playerRight > obsLeft + 5 &&
                        playerLeft < obsRight - 5 &&
                        !isDescendingFromObstacle) {
                        return true;
                    }
                } else if (obs.type === 'triangle') {
                    const topY = obs.y;
                    const bottomY = obs.y + obs.height;
                    const leftX = obsScreenX;
                    const rightX = obsScreenX + obs.width;
                    const centerX = obsScreenX + obs.width / 2;
                    if (player.x >= rightX || player.x + player.width <= leftX || player.y >= bottomY || player.y + player.height <= topY) continue;
                    const checkPoint = {
                        x: player.x + player.width / 2,
                        y: player.y + player.height / 2
                    };
                    if (checkPoint.x >= leftX && checkPoint.x <= rightX && checkPoint.y >= topY && checkPoint.y <= bottomY) {
                        let lineY;
                        if (checkPoint.x <= centerX) {
                            lineY = topY + (bottomY - topY) * (checkPoint.x - leftX) / (obs.width / 2);
                            if (checkPoint.y >= lineY + 15) return true;
                        } else {
                            lineY = topY + (bottomY - topY) * (rightX - checkPoint.x) / (obs.width / 2);
                            if (checkPoint.y >= lineY + 15) return true;
                        }
                    }
                }
            }
            for (let pit of pits) {
                const pitScreenX = pit.x - cameraX;
                const groundLevel = pit.y;
                const playerBottom = player.y + player.height;
                const playerLeft = player.x;
                const playerRight = player.x + player.width;
                const isOverlapping = playerRight > pitScreenX && playerLeft < pitScreenX + pit.width;
                if (isOverlapping && playerBottom > groundLevel + 180) return true;
            }

            return false;
        }

        function checkGoal() {
            const goalScreenX = goalX - cameraX;
            return player.x >= goalScreenX - 50;
        }

        function updateDisplay() {
            document.getElementById('stageDisplay').textContent = currentStage;
            const remainingDistance = Math.max(0, Math.floor((goalX - cameraX - player.x) / 10));
            document.getElementById('distanceDisplay').textContent = remainingDistance;
        }

        function gameLoop() {
            if (!gameRunning || gamePaused) return;
            targetCameraX += scrollSpeed;
            cameraX += (targetCameraX - cameraX) * 0.1;
            if (playerImageLoaded && spriteFrameWidth > 0 && !player.isJumping) {
                animationCounter++;
                if (animationCounter >= animationSpeed) {
                    animationCounter = 0;
                    animationFrameIndex = (animationFrameIndex + 1) % spriteFrameCount;
                }
            }

            let currentGravity = gravity;
            if (player.velocityY > 0) {
                const fallSpeed = Math.min(player.velocityY, 5);
                currentGravity = gravity * (1 + fallSpeed * 0.1);
            } else if (player.velocityY > -3) {
                const nearTop = (player.velocityY + 3) / 3;
                currentGravity = gravity * (0.3 + nearTop * 0.4);
            }
            player.velocityY += currentGravity;
            player.y += player.velocityY;
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
            let onPit = false;
            for (let pit of pits) {
                const pitScreenX = pit.x - cameraX;
                if (player.x + player.width > pitScreenX &&
                    player.x < pitScreenX + pit.width) {
                    onPit = true;
                    break;
                }
            }

            // 障害物の上に乗っているかチェック
            let onObstacle = false;
            let obstacleTop = player.groundY;
            
            for (let obs of obstacles) {
                if (obs.type === 'box' && isOnObstacle(obs)) {
                    obstacleTop = obs.y;
                    onObstacle = true;
                    // プレイヤーを障害物の上に配置
                    if (player.y + player.height > obs.y && player.velocityY >= 0) {
                        player.y = obs.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                    }
                    break;
                }
            }

            // 地面との衝突判定（落とし穴の上にいない場合のみ）
            if (!onPit && !onObstacle && player.y >= player.groundY) {
                player.y = player.groundY;
                player.velocityY = 0;
                player.isJumping = false;
            }

            // 衝突判定
            if (checkCollisions()) {
                gameOver();
                return;
            }

            // ゴール判定
            if (checkGoal()) {
                stageClear();
                return;
            }

            // フレームレート制限（タブレットでは30fpsに制限）
            const currentTime = performance.now();
            const elapsed = currentTime - lastFrameTime;
            
            if (elapsed >= frameInterval) {
                lastFrameTime = currentTime - (elapsed % frameInterval);
                
                // 描画
                draw();

                // 表示更新
                updateDisplay();
            }

            requestAnimationFrame(gameLoop);
        }

        // 描画
        function draw() {
            // 背景をクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景（空）- Apple風のグラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1e3a5f');
            gradient.addColorStop(0.3, '#2d5a7f');
            gradient.addColorStop(0.6, '#4a7ba7');
            gradient.addColorStop(1, '#6b9bc7');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 背景の光の効果（固定位置）- 軽量モードでは簡略化
            if (!useLightweightMode) {
                const lightGradient = ctx.createRadialGradient(
                    canvas.width * 0.3, 
                    canvas.height * 0.3, 
                    0,
                    canvas.width * 0.3, 
                    canvas.height * 0.3, 
                    canvas.width * 0.8
                );
                lightGradient.addColorStop(0, 'rgba(102, 126, 234, 0.2)');
                lightGradient.addColorStop(1, 'rgba(102, 126, 234, 0)');
                ctx.fillStyle = lightGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 地面 - Apple風のデザイン
            const groundGradient = ctx.createLinearGradient(0, canvas.height - groundHeight, 0, canvas.height);
            groundGradient.addColorStop(0, '#3d2817');
            groundGradient.addColorStop(1, '#2d1f12');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            // 地面のハイライト（軽量モードでは簡略化）
            if (!useLightweightMode) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 2);
            }

            // 落とし穴を描画 - 視認性の高い色
            for (let pit of pits) {
                const pitScreenX = pit.x - cameraX;
                if (pitScreenX > -pit.width && pitScreenX < canvas.width) {
                    // 落とし穴のグラデーション（暗い赤〜黒で危険感を演出）
                    const pitGradient = ctx.createLinearGradient(
                        pitScreenX, pit.y,
                        pitScreenX, pit.y + pit.depth
                    );
                    pitGradient.addColorStop(0, '#8b2500');
                    pitGradient.addColorStop(0.3, '#5c1a00');
                    pitGradient.addColorStop(0.7, '#2d0d00');
                    pitGradient.addColorStop(1, '#0a0300');
                    
                    ctx.fillStyle = pitGradient;
                    ctx.fillRect(pitScreenX, pit.y, pit.width, pit.depth);
                    
                    // 落とし穴の縁（オレンジで強調）
                    ctx.strokeStyle = '#ff6b35';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(pitScreenX, pit.y, pit.width, 4);
                    
                    if (!useLightweightMode) {
                        ctx.strokeStyle = 'rgba(255, 140, 80, 0.5)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(pitScreenX, pit.y, pit.width, pit.depth);
                    }
                }
            }

            // 障害物を描画 - Apple風のデザイン
            for (let obs of obstacles) {
                const obsScreenX = obs.x - cameraX;
                if (obsScreenX > -obs.width && obsScreenX < canvas.width) {
                    if (obs.type === 'triangle') {
                        // 三角の障害物を描画（グラデーション）
                        const triangleGradient = ctx.createLinearGradient(
                            obsScreenX, obs.y,
                            obsScreenX, obs.y + obs.height
                        );
                        triangleGradient.addColorStop(0, '#ff6b6b');
                        triangleGradient.addColorStop(1, '#ee5a6f');
                        
                        if (!useLightweightMode) {
                            ctx.shadowBlur = 20;
                            ctx.shadowColor = 'rgba(255, 107, 107, 0.5)';
                        }
                        ctx.fillStyle = triangleGradient;
                        ctx.beginPath();
                        ctx.moveTo(obsScreenX + obs.width / 2, obs.y);
                        ctx.lineTo(obsScreenX, obs.y + obs.height);
                        ctx.lineTo(obsScreenX + obs.width, obs.y + obs.height);
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        
                        // ハイライト（軽量モードでは簡略化）
                        if (!useLightweightMode) {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                            ctx.beginPath();
                            ctx.moveTo(obsScreenX + obs.width / 2, obs.y);
                            ctx.lineTo(obsScreenX + obs.width * 0.3, obs.y + obs.height * 0.5);
                            ctx.lineTo(obsScreenX + obs.width * 0.2, obs.y + obs.height);
                            ctx.lineTo(obsScreenX, obs.y + obs.height);
                            ctx.closePath();
                            ctx.fill();
                        }
                    } else {
                        // 四角の障害物を描画（グラデーション）
                        const boxGradient = ctx.createLinearGradient(
                            obsScreenX, obs.y,
                            obsScreenX, obs.y + obs.height
                        );
                        boxGradient.addColorStop(0, '#8B6F47');
                        boxGradient.addColorStop(1, '#6B5432');
                        
                        if (!useLightweightMode) {
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        }
                        ctx.fillStyle = boxGradient;
                        ctx.fillRect(obsScreenX, obs.y, obs.width, obs.height);
                        ctx.shadowBlur = 0;
                        
                        // ハイライト（軽量モードでは簡略化）
                        if (!useLightweightMode) {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                            ctx.fillRect(obsScreenX, obs.y, obs.width, obs.height * 0.3);
                            
                            // 影
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                            ctx.fillRect(obsScreenX + 3, obs.y + obs.height, obs.width, 6);
                        }
                    }
                }
            }

            // ゴールを描画 - Apple風のデザイン
            const goalScreenX = goalX - cameraX;
            if (goalScreenX > -100 && goalScreenX < canvas.width + 100) {
                // ゴールの光の効果（軽量モードでは簡略化）
                if (!useLightweightMode) {
                    const goalGlow = ctx.createRadialGradient(
                        goalScreenX, canvas.height - groundHeight - 75,
                        0,
                        goalScreenX, canvas.height - groundHeight - 75,
                        100
                    );
                    goalGlow.addColorStop(0, 'rgba(76, 175, 80, 0.4)');
                    goalGlow.addColorStop(1, 'rgba(76, 175, 80, 0)');
                    ctx.fillStyle = goalGlow;
                    ctx.fillRect(goalScreenX - 100, 0, 200, canvas.height);
                }
                
                // ゴールフラッグ（グラデーション）
                const flagGradient = ctx.createLinearGradient(
                    goalScreenX - 5, canvas.height - groundHeight - 150,
                    goalScreenX - 5, canvas.height - groundHeight
                );
                flagGradient.addColorStop(0, '#4CAF50');
                flagGradient.addColorStop(1, '#2E7D32');
                
                if (!useLightweightMode) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(76, 175, 80, 0.6)';
                }
                ctx.fillStyle = flagGradient;
                ctx.fillRect(goalScreenX - 5, canvas.height - groundHeight - 150, 10, 150);
                ctx.shadowBlur = 0;
                
                // フラッグのハイライト（軽量モードでは簡略化）
                if (!useLightweightMode) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(goalScreenX - 5, canvas.height - groundHeight - 150, 10, 50);
                }
                
                // フラッグの布部分（グラデーション）
                const clothGradient = ctx.createLinearGradient(
                    goalScreenX - 5, canvas.height - groundHeight - 100,
                    goalScreenX + 30, canvas.height - groundHeight - 125
                );
                clothGradient.addColorStop(0, '#FFD700');
                clothGradient.addColorStop(1, '#FFA500');
                
                ctx.fillStyle = clothGradient;
                ctx.beginPath();
                ctx.moveTo(goalScreenX - 5, canvas.height - groundHeight - 150);
                ctx.lineTo(goalScreenX - 5, canvas.height - groundHeight - 100);
                ctx.lineTo(goalScreenX + 30, canvas.height - groundHeight - 125);
                ctx.closePath();
                ctx.fill();
            }

            // プレイヤーを描画
            if (playerImageLoaded && spriteFrameWidth > 0) {
                // 画像が読み込まれている場合はスプライトシートから描画（影なし）
                // 画像下部の余白分、描画を下にずらして足を地面に接地させる
                const footDrawOffset = Math.floor(player.height * 0.25);  // 画像下部余白分、足を地面に接地
                
                // スプライトシートから現在のフレームを切り出して描画
                // 走行中はアニメーション、ジャンプ中は1コマ目を表示
                const currentFrame = player.isJumping ? 0 : animationFrameIndex;
                const sourceX = currentFrame * spriteFrameWidth;
                
                ctx.drawImage(
                    playerSpriteSheet,
                    sourceX, 0,                    // スプライトシート上の切り出し位置（x, y）
                    spriteFrameWidth, playerSpriteSheet.height, // 切り出すサイズ
                    player.x, player.y + footDrawOffset,  // 描画先の位置（下にオフセット）
                    player.width, player.height    // 描画サイズ
                );
            } else {
                // 画像が読み込まれていない場合はデフォルトの描画（フォールバック、影なし）
                // プレイヤーの本体（グラデーション）
                const playerGradient = ctx.createLinearGradient(
                    player.x, player.y, 
                    player.x, player.y + player.height
                );
                playerGradient.addColorStop(0, '#ff7a8a');
                playerGradient.addColorStop(1, '#ff6b6b');
                ctx.fillStyle = playerGradient;
                if (!useLightweightMode) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(255, 107, 107, 0.5)';
                }
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.shadowBlur = 0;
                
                // プレイヤーのハイライト（軽量モードでは簡略化）
                if (!useLightweightMode) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(player.x, player.y, player.width, player.height * 0.3);
                }
                
                // プレイヤーの目
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(player.x + 10, player.y + 15, 8, 8);
                ctx.fillRect(player.x + 22, player.y + 15, 8, 8);
                ctx.fillStyle = '#000000';
                ctx.fillRect(player.x + 12, player.y + 17, 4, 4);
                ctx.fillRect(player.x + 24, player.y + 17, 4, 4);
                
            }

            // 雲を描画（装飾）- Apple風の洗練された雲（固定位置）
            // 軽量モードでは雲を描画しない（パフォーマンス向上）
            if (!useLightweightMode) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                for (let i = 0; i < 4; i++) {
                    const cloudX = (i * 400) % canvas.width;
                    const cloudY = 40 + Math.sin(i) * 10;
                    ctx.beginPath();
                    ctx.arc(cloudX, cloudY, 25, 0, Math.PI * 2);
                    ctx.arc(cloudX + 30, cloudY, 30, 0, Math.PI * 2);
                    ctx.arc(cloudX + 60, cloudY, 25, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // ゲームオーバー
        function gameOver() {
            gameRunning = false;
            gamePaused = true;
            playGameOverSound(); // ゲームオーバー効果音
            
            document.getElementById('gameOverModal').classList.add('show');
        }

        // ステージクリア
        function stageClear() {
            gameRunning = false;
            gamePaused = true;
            
            if (currentStage < 3) {
                document.getElementById('stageClearMessage').textContent = 
                    `ステージ${currentStage}をクリアしました！`;
                document.getElementById('stageClearModal').classList.add('show');
            } else {
                // 全ステージクリア
                document.getElementById('stageClearMessage').textContent = 
                    '全ステージクリア！おめでとうございます！';
                document.getElementById('stageClearModal').classList.add('show');
            }
        }

        // 次のステージへ
        function nextStage() {
            if (currentStage < 3) {
                currentStage++;
                document.getElementById('stageClearModal').classList.remove('show');
                loadStage(currentStage);
                startGame();
            } else {
                // ゲームクリア
                document.getElementById('stageClearModal').classList.remove('show');
                restartGame();
            }
        }

        // ステージを再スタート
        function restartStage() {
            document.getElementById('gameOverModal').classList.remove('show');
            loadStage(currentStage);
            startGame();
        }

        // ゲームを再開
        function restartGame() {
            currentStage = 1;
            document.getElementById('gameOverModal').classList.remove('show');
            document.getElementById('stageClearModal').classList.remove('show');
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = false;
            startBtn.textContent = 'ゲーム開始';
            loadStage(currentStage);
            // ゲームは自動開始しない
        }

        // ゲーム開始
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            gameLoop();
        }

        // エラーメッセージを表示する関数
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            if (errorDiv) {
                errorDiv.textContent = 'エラー: ' + message;
                errorDiv.style.display = 'block';
            }
        }
        
        // エラーメッセージを非表示にする関数
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            if (errorDiv) {
                errorDiv.style.display = 'none';
            }
        }
        
        // スタートボタンの処理
        function handleStart() {
            try {
                hideError();
                const startBtn = document.getElementById('startBtn');
                if (startBtn.disabled) return;
                
                startBtn.disabled = true;
                startBtn.textContent = 'ゲーム中...';
                loadStage(1);
                startGame();
            } catch (error) {
                showError(error.message || '不明なエラーが発生しました');
                const startBtn = document.getElementById('startBtn');
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.textContent = 'ゲーム開始';
                }
            }
        }

        // 最終更新日時を表示
        function updateLastUpdateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const dateStr = `${year}年${month}月${day}日 ${hours}:${minutes}`;
            document.getElementById('lastUpdate').textContent = `最終更新: ${dateStr}`;
        }

        // イベントリスナー
        const startBtnEl = document.getElementById('startBtn');
        if (startBtnEl) startBtnEl.addEventListener('click', handleStart);
        else showError('スタートボタンが見つかりません');
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                
                // ゲームオーバーモーダルが表示されている場合はリスタート
                const gameOverModal = document.getElementById('gameOverModal');
                if (gameOverModal.classList.contains('show')) {
                    restartStage();
                    return;
                }
                
                // ステージクリアモーダルが表示されている場合は次のステージへ
                const stageClearModal = document.getElementById('stageClearModal');
                if (stageClearModal.classList.contains('show')) {
                    nextStage();
                    return;
                }
                
                // ゲームが実行中でない場合はスタート
                if (!gameRunning) {
                    handleStart();
                } else {
                    jump();
                }
            }
        });

        document.getElementById('jumpBtn').addEventListener('click', jump);
        document.getElementById('jumpBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // タブレット対応：画面のどこを押してもジャンプ
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && !gamePaused) {
                jump();
            }
        });

        // ゲームコンテナ全体でもタッチイベントを受け付ける
        document.querySelector('.game-container').addEventListener('touchstart', (e) => {
            // ボタンやリンク以外の場所をタッチした場合のみジャンプ
            if (e.target === canvas || e.target === document.querySelector('.game-info') || 
                e.target.closest('.game-info') || e.target.closest('.controls')) {
                e.preventDefault();
                if (gameRunning && !gamePaused) {
                    jump();
                }
            }
        });

        // グローバルエラーハンドラー（すべてのエラーをキャッチ）
        window.addEventListener('error', function(event) {
            const errorMsg = event.error ? event.error.message : '不明なエラーが発生しました';
            const errorDiv = document.getElementById('errorMessage');
            if (errorDiv) {
                errorDiv.textContent = 'エラー: ' + errorMsg;
                errorDiv.style.display = 'block';
            } else {
                alert('エラーが発生しました: ' + errorMsg);
            }
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            const errorMsg = event.reason ? event.reason.toString() : '不明なエラー';
            const errorDiv = document.getElementById('errorMessage');
            if (errorDiv) {
                errorDiv.textContent = 'エラー: ' + errorMsg;
                errorDiv.style.display = 'block';
            } else {
                alert('エラーが発生しました: ' + errorMsg);
            }
        });

        // 初期化
        try { updateLastUpdateTime(); } catch (e) { showError('初期化エラー: ' + (e.message || e)); }
        
        // オーディオコンテキストを初期化（ユーザーインタラクション後に有効化される）
        
        // ユーザーインタラクションでオーディオコンテキストを初期化
        document.addEventListener('click', () => {
            if (!audioContext) {
                initAudioContext();
            }
        }, { once: true });

        document.addEventListener('touchstart', () => {
            if (!audioContext) {
                initAudioContext();
            }
        }, { once: true });
        
        // ゲームは自動開始しない（スタートボタンを待つ）
    </script>
</body>
</html>
